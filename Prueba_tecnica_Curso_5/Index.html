<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="CSS/Styles.css"> 
</head>

<body>
    <header class="header">
        <h1 class="title"> Mi To Do List</h1>
    </header>

    <main class="container">
        <section class="add-tareas">
            <form class="form">
                <label for="input-tarea" class="visually-hidden"> Nueva tarea: </label>
                <input type="text" id="input-tarea" placeholder="Hacer la cama..." class="input-tarea">

                <button type="submit" class="btn-tarea">Añadir</button>
            </form>
        </section>
      
        <section class="lista">
           <ul class="lista-tareas" id="lista-tareas"></ul>
        </section>
        
        <section class="botones"> 
            <button class="btn-eliminar-complet"> Eliminar completadas</button>
            <button class="btn-eliminar-todas"> Eliminar todas</button>
        </section>
    </main>
    
    <footer class="footer">

        <h3 class="contact">Contacto</h3>
        <ul>
            <li>Teléfono: +34 123 456 789</li>
            <li>Email: listaToDo@gmail.com</li>
            <li>Dirección: Calle de la Lista 1, Madrid</li>
        </ul>
    </footer>

    <script src="script.js"></script>

</body>
</html>
